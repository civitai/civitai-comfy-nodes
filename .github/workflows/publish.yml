name: Publish to Comfy Registry

# Publishes to registry.comfy.org whenever the version in pyproject.toml changes on main
# (the sync-spec PR does this), or on demand. The registry rejects a duplicate version,
# so re-running on an unchanged version is a no-op.
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # We call comfy-cli directly rather than Comfy-Org/publish-node-action: that action's
      # tagged releases shell out to `comfy --yes env`, an option current comfy-cli dropped,
      # so they fail. Pin the cli and use its current non-interactive flags.
      - name: Install comfy-cli
        run: pip install "comfy-cli==1.10.4"
      - name: Publish
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          comfy --skip-prompt env
          comfy --skip-prompt node publish --token "$REGISTRY_ACCESS_TOKEN"
